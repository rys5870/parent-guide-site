# פרודקשן: Mongo + אפליקציה מתוך GHCR (+ אופציה ל-build מקומי) + Nginx כפרוקסי
# לא מפרסם Mongo לרשת — רק Nginx מאזין 80/443.
#
# APP_IMAGE — אופציונלי ברירת מחדל: parent-guide:latest (אחרי `docker compose ... build`). ל־GHCR: APP_IMAGE ב־.env.prod
#
# הרצה בשרת (אחרי יצירת .env.prod עם מפתחות Clerk וכו'):
#   docker compose --env-file .env.prod -f docker-compose.prod.yml build && docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
# או משיכת תמונה מהרישום בלי build:
#   docker compose --env-file .env.prod -f docker-compose.prod.yml pull && docker compose --env-file .env.prod -f docker-compose.prod.yml up -d

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  app:
    # אחרי `docker build -t parent-guide:latest .` ניתן להשאיר ברירת מחדל ללא שורה ב־.env.prod
    image: ${APP_IMAGE:-parent-guide:latest}
    pull_policy: missing
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env.prod
    # לא מגדירים כאן MONGODB_URI: החלפת ${VAR} מתייחסת ל־.env / סביבת ההמארח ולא ל־env_file,
    # וגרמה לדריסת המחרוזת מ־.env.prod במקרים שבהם ההמארח מגדיר VAR אחר או קובץ .env למפתחות מקומיים.
    # Mongo לפי Compose: בתוך .env.prod הגדירו MONGODB_URI=mongodb://mongo:27017/parent-guide
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    depends_on:
      mongo:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # אחרי שיש תעודות (certbot וכו') — פרסמו כרך ונסו אותן:
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app

volumes:
  mongo_data:
