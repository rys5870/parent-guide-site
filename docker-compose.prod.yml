# פרודקשן: Mongo + אפליקציה מתוך GHCR + Nginx כפרוקסי
# לא מפרסם Mongo לרשת — רק Nginx מאזין 80/443.
#
# APP_IMAGE — Docker image מהרישום (למשל מה־GHCR לאחר CI).
#
# הרצה בשרת (אחרי יצירת .env.prod):
#   export APP_IMAGE=ghcr.io/owner/repo:latest
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  app:
    image: ${APP_IMAGE:?לא הוגדר APP_IMAGE לדוגמה ghcr.io/owner/repo:latest}
    pull_policy: always
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/parent-guide}
    depends_on:
      mongo:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # אחרי שיש תעודות (certbot וכו') — פרסמו כרך ונסו אותן:
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app

volumes:
  mongo_data:
